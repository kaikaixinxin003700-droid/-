        // ==================== 全局变量 ====================
        let currentUser = null;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化 EmailJS
            if (CONFIG.EMAILJS_PUBLIC_KEY && CONFIG.EMAILJS_PUBLIC_KEY !== '请填写您的EmailJS Public Key') {
                emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);
            }

            // 获取 URL 中的机台 ID 并显示
            const urlParams = new URLSearchParams(window.location.search);
            const machineIdFromUrl = urlParams.get('id'); // 获取 ?id= 后的值
            const machineTag = document.getElementById('machineId');
            if (machineIdFromUrl && machineTag) {
                machineTag.innerText = machineIdFromUrl + " 号机";
                window.currentMachineId = machineIdFromUrl; // 供反馈使用
            } else {
                machineTag.innerText = "未知机台";
            }

            // 语言切换按钮
            document.getElementById('langSwitchBtn').addEventListener('click', function() {
                currentLang = currentLang === 'zh' ? 'vi' : 'zh';
                updateUILanguage();
                // 如果当前参数区域可见，重新渲染以更新标题等
                if (document.getElementById('paramsSection').classList.contains('show')) {
                    showParameters(); // 重新调用显示参数
                }
                // 更新反馈计数器显示
                updateFeedbackCounter();
                refreshWatermark();
            });

            loadProducts();

            // 自动匹配：如果机台 ID 存在于映射表中，则自动选择对应的产品、材料、模具并显示参数
            if (machineIdFromUrl && machineMapping[machineIdFromUrl]) {
                const mapping = machineMapping[machineIdFromUrl];
                const productSelect = document.getElementById('productSelect');
                const materialSelect = document.getElementById('materialSelect');
                const moldSelect = document.getElementById('moldSelect');

                // 设置产品
                productSelect.value = mapping.product;
                onProductChange(); // 填充材料选项

                // 设置材料
                materialSelect.value = mapping.material;
                onMaterialChange(); // 填充模具选项

                // 设置模具
                moldSelect.value = mapping.mold;
                onMoldChange(); // 更新按钮状态

                // 自动点击查看参数按钮
                document.getElementById('viewParamsBtn').click();
            }
            
            document.getElementById('productSelect').addEventListener('change', onProductChange);
            document.getElementById('materialSelect').addEventListener('change', onMaterialChange);
            document.getElementById('moldSelect').addEventListener('change', onMoldChange);
            document.getElementById('viewParamsBtn').addEventListener('click', showParameters);
            document.getElementById('feedbackBtn').addEventListener('click', showFeedbackForm);

            loadUserInfo();
            loadFeedbackCount();

            initWatermark(machineIdFromUrl || "未知机台");

            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('copy', e => e.preventDefault());
            document.addEventListener('cut', e => e.preventDefault());
        });

        // 更新界面语言 (修复：不再修改机台号)
        function updateUILanguage() {
            // 更新所有带 data-i18n 属性的元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = t(key);
            });
            // 更新select中的placeholder选项（option）
            document.querySelectorAll('select option[data-i18n]').forEach(opt => {
                opt.innerText = t(opt.getAttribute('data-i18n'));
            });
            // 注意：机台号（machineId）是动态内容，不在此处修改，保持原有值
        }

        // 登录弹窗使用i18n
        function showLogin(forceFirst = false) {
            Swal.fire({
                title: t('login_title'),
                html: `
                    <div style="text-align: left;">
                        <p style="color: #666; margin-bottom: 15px;">${t('login_desc')}</p>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">${t('login_name_label')} <span style="color: red;">*</span></label>
                            <input type="text" id="userName" placeholder="${t('login_name_label')}" 
                                style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">${t('login_dept_label')}</label>
                            <input type="text" id="userDept" placeholder="${t('login_dept_label')}" 
                                style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">${t('login_contact_label')}</label>
                            <input type="text" id="userContact" placeholder="${t('login_contact_label')}" 
                                style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                        </div>
                    </div>
                `,
                showCancelButton: !forceFirst,
                confirmButtonText: t('login_save'),
                cancelButtonText: t('login_cancel'),
                allowOutsideClick: false,
                preConfirm: () => {
                    const name = document.getElementById('userName').value.trim();
                    if (!name) {
                        Swal.showValidationMessage(t('login_required'));
                        return false;
                    }
                    const dept = document.getElementById('userDept').value.trim();
                    const contact = document.getElementById('userContact').value.trim();
                    return { name, dept, contact };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.setItem('injection_user', JSON.stringify(result.value));
                    currentUser = result.value;
                    updateUserStatus();
                    refreshWatermark();
                    Swal.fire({ title: t('login_success'), icon: 'success', timer: 1500, showConfirmButton: false });
                } else if (forceFirst) {
                    showLogin(true);
                }
            });
        }

        // 反馈弹窗使用i18n
        function showFeedbackForm() {
            // 强制登录检查
            if (!currentUser) {
                Swal.fire({
                    title: t('need_login_title'),
                    text: t('need_login_text_feedback'),
                    icon: 'warning',
                    confirmButtonText: t('go_set'),
                    allowOutsideClick: false
                }).then(() => {
                    showLogin();
                });
                return;
            }

            const product = document.getElementById('productSelect').value || '未选择';
            const material = document.getElementById('materialSelect').value || '未选择';
            const mold = document.getElementById('moldSelect').value || '未选择';
            const machineId = document.getElementById('machineId').textContent;
            
            let userInfoHtml = `<div style="background: #f0f9ff; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #bae0ff;"><p style="margin: 0; font-size: 14px; color: #0066cc;"><strong>${t('feedback_btn')}:</strong> ${currentUser.name}${currentUser.dept ? `(${currentUser.dept})` : ''}</p></div>`;
            
            Swal.fire({
                title: t('feedback_title'),
                html: `<div style="text-align: left; max-height: 500px; overflow-y: auto;">${userInfoHtml}<div style="margin-bottom: 15px;"><label style="display: block; margin-bottom: 5px; font-weight: 600;">${t('feedback_type_label')}</label><select id="fbType" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; margin-bottom:15px;"><option value="参数不一致">${t('feedback_type1')}</option><option value="操作问题">${t('feedback_type2')}</option><option value="设备故障">${t('feedback_type3')}</option><option value="材料问题">${t('feedback_type4')}</option><option value="改进建议">${t('feedback_type5')}</option><option value="其他">${t('feedback_type6')}</option></select></div><div style="margin-bottom: 15px;"><label style="display: block; margin-bottom: 5px; font-weight: 600;">${t('feedback_content_label')}</label><textarea id="fbContent" placeholder="${t('feedback_placeholder')}" style="width:100%; min-height:120px; padding:10px; border:1px solid #ddd; border-radius:6px; resize: vertical;"></textarea></div><div style="margin-top: 15px;"><label><input type="checkbox" id="fbUrgent" style="margin-right: 5px;"><strong>${t('feedback_urgent')}</strong></label></div></div>`,
                showCancelButton: true,
                confirmButtonText: t('feedback_submit'),
                confirmButtonColor: '#ffa940',
                preConfirm: () => {
                    const type = document.getElementById('fbType').value;
                    const content = document.getElementById('fbContent').value;
                    const urgent = document.getElementById('fbUrgent').checked;
                    if (!content.trim()) { Swal.showValidationMessage(t('feedback_required')); return false; }
                    return { 
                        product, material, mold, machineId, 
                        user_name: currentUser.name, 
                        user_dept: currentUser.dept || '', 
                        type, content, urgent, 
                        timestamp: new Date().toISOString(), 
                        page_url: window.location.href 
                    };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    submitFeedback(result.value);
                }
            });
        }

                        <div class="param-item"><div class="param-label">${t('screw_out_pressure')}</div><div class="param-value">${params.screwOutPressure}</div></div>

                    </div>
                `;
            }

            let html = `
                <div class="section-title"><i class="fas fa-info-circle"></i> ${t('base_params', { mold })}</div>
                <div class="param-grid">
                    <div class="param-item"><div class="param-label">${t('drying_temp')}</div><div class="param-value">${params.dryingTemp}</div></div>
                    <div class="param-item"><div class="param-label">${t('weight')}</div><div class="param-value important">${params.weight}</div></div>
                    <div class="param-item"><div class="param-label">${t('fixed_mold_temp')}</div><div class="param-value">${params.fixedMoldTemp}</div></div>
                    <div class="param-item"><div class="param-label">${t('moving_mold_temp')}</div><div class="param-value">${params.movingMoldTemp}</div></div>
                    <div class="param-item"><div class="param-label">${t('temp_control_box')}</div><div class="param-value">${params.tempControlBox}</div></div>
                    <div class="param-item"><div class="param-label">${t('mold_opening_end')}</div><div class="param-value important">${params.moldOpeningEnd}</div></div>
                    <div class="param-item"><div class="param-label">${t('ejection_end')}</div><div class="param-value important">${params.ejectionEnd}</div></div>
                </div>
                <div class="section-title"><i class="fas fa-thermometer-half"></i> ${t('temp_params')}</div>
                <table class="param-table"><tr><th>${t('table_nozzle')}</th><th>${t('table_barrel1')}</th><th>${t('table_barrel2')}</th><th>${t('table_barrel3')}</th><th>${t('table_barrel4')}</th></tr>
                <tr><td>${params.nozzle}</td><td>${params.barrel1}</td><td>${params.barrel2}</td><td>${params.barrel3}</td><td>${params.barrel4}</td></tr></table>
                <div class="section-title"><i class="fas fa-tint"></i> ${t('injection_params')}</div>
                <table class="param-table"><tr><th>${t('table_stage')}</th><th>${t('table_speed')}</th><th>${t('table_pressure')}</th><th>${t('table_position')}</th></tr>
                ${injectionRows}
                </table>
                <div class="section-title"><i class="fas fa-bolt"></i> ${t('holding_params')}</div>
                <div class="param-grid"><div class="param-item"><div class="param-label">${t('holding_end')}</div><div class="param-value">${params.holdingEnd}</div></div>
                <div class="param-item"><div class="param-label">${t('holding_position')}</div><div class="param-value">${params.holdingPosition}</div></div>
                <div class="param-item"><div class="param-label">${t('holding_time')}</div><div class="param-value important">${params.holdingTime}</div></div></div>
                <div style="margin-top: 15px; font-size: 13px; color: #666;"><strong>${t('holding_first')}</strong> ${t('time')}: ${params.holding1Time} | ${t('speed')}: ${params.holding1Speed} | ${t('pressure')}: ${params.holding1Pressure}</div>
                ${params.holding2Time ? `<div style="margin-top: 10px; font-size: 13px; color: #666;"><strong>${t('holding_second')}</strong> ${t('time')}: ${params.holding2Time} | ${t('speed')}: ${params.holding2Speed} | ${t('pressure')}: ${params.holding2Pressure}</div>` : ''}
                <div class="section-title"><i class="fas fa-recycle"></i> ${t('melting_params')}</div>
                <table class="param-table"><tr><th>${t('table_stage')}</th><th>${t('table_backpressure')}</th><th>${t('table_speed')}</th><th>${t('table_melt_pressure')}</th><th>${t('table_position')}</th></tr>
                <tr><td>1</td><td>${params.melting1BackPressure}</td><td>${params.melting1Speed}</td><td>${params.melting1Pressure}</td><td>${params.melting1Position}</td></tr>
                <tr><td>2</td><td>${params.melting2BackPressure}</td><td>${params.melting2Speed}</td><td>${params.melting2Pressure}</td><td>${params.melting2Position}</td></tr>
                <tr><td>3</td><td>${params.melting3BackPressure}</td><td>${params.melting3Speed}</td><td>${params.melting3Pressure}</td><td>${params.melting3Position}</td></tr></table>
                ${screwHtml}
                <div style="background: #f0f7ff; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #e8f1ff;"><div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;"><i class="fas fa-lightbulb" style="color: #0052d9;"></i><strong>${t('tip')}</strong></div><p style="margin: 0; font-size: 13px; color: #666;">${t('tip_text')}</p></div>
            `;
            document.getElementById('paramsSection').innerHTML = html;
            document.getElementById('paramsSection').classList.add('show');
            document.getElementById('paramsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 其余函数基本不变，但需要在需要翻译的地方使用 t()，例如用户状态、反馈计数器等
        function updateUserStatus() {
            const userStatusDiv = document.getElementById('userStatus');
            if (currentUser) {
                userStatusDiv.innerHTML = `<div style="display: inline-flex; align-items: center; gap: 8px; background: #f0f9ff; padding: 6px 12px; border-radius: 16px;"><div style="width: 24px; height: 24px; border-radius: 50%; background: #0052d9; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px;">${currentUser.name.charAt(0)}</div><span>${currentUser.name}</span><button onclick="logout()" style="background: none; border: none; color: #999; font-size: 12px; cursor: pointer;">${t('logout') || '退出'}</button></div>`;
            } else {
                userStatusDiv.innerHTML = `${t('user_status_anonymous')}<span class="login-link" onclick="showLogin()">${t('set_personal_info')}</span>`;
            }
        }

        function updateFeedbackCounter() {
            const counter = document.getElementById('feedbackCounter');
            if (feedbackCount > 0) {
                counter.innerHTML = t('feedback_counter', { count: feedbackCount });
                counter.style.color = '#ffa940';
            } else {
                counter.innerHTML = '';
            }
        }

        // 水印
        function initWatermark(machineId) {
            updateWatermark(machineId);
            setInterval(() => updateWatermark(machineId), 30000);
        }

        function updateWatermark(machineId) {
            const layer = document.getElementById('watermark-layer');
            if (!layer) return;
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('zh-CN');
            const userName = currentUser ? currentUser.name : '匿名';
            const baseText = `${machineId} | ${userName} | ${dateStr} ${timeStr}`;
            let items = '';
            for (let i = 0; i < 12; i++) {
                items += `<span class="watermark-item">${baseText}</span>`;
            }
            layer.innerHTML = items;
        }

        function refreshWatermark() {
            const machineId = document.getElementById('machineId').textContent;
            updateWatermark(machineId);
        }

        // 产品/材料/模具 函数
        function loadProducts() {
            const productSelect = document.getElementById('productSelect');
            const products = Object.keys(processDatabase);
            products.forEach(product => {
                const option = document.createElement('option');
                option.value = product;
                option.textContent = product;
                productSelect.appendChild(option);
            });
        }

        function onProductChange() {
            const product = document.getElementById('productSelect').value;
            const materialSelect = document.getElementById('materialSelect');
            const moldSelect = document.getElementById('moldSelect');
            
            materialSelect.innerHTML = '<option value="" data-i18n="material_placeholder">' + t('material_placeholder') + '</option>';
            materialSelect.disabled = !product;
            moldSelect.innerHTML = '<option value="" data-i18n="mold_placeholder">' + t('mold_placeholder') + '</option>';
            moldSelect.disabled = true;
            updateViewButton();
            
            if (product) {
                const materials = Object.keys(processDatabase[product]);
                materials.forEach(material => {
                    const option = document.createElement('option');
                    option.value = material;
                    option.textContent = material;
                    materialSelect.appendChild(option);
                });
            }
            // 更新语言属性
            updateUILanguage();
        }

        function onMaterialChange() {
            const product = document.getElementById('productSelect').value;
            const material = document.getElementById('materialSelect').value;
            const moldSelect = document.getElementById('moldSelect');
            
            moldSelect.innerHTML = '<option value="" data-i18n="mold_placeholder">' + t('mold_placeholder') + '</option>';
            moldSelect.disabled = !product || !material;
            updateViewButton();
            
            if (product && material) {
                const molds = Object.keys(processDatabase[product][material]);
                molds.forEach(mold => {
                    const option = document.createElement('option');
                    option.value = mold;
                    option.textContent = `模具 ${mold}`;
                    moldSelect.appendChild(option);
                });
            }
            updateUILanguage();
        }

        function onMoldChange() {
            updateViewButton();
        }

        function updateViewButton() {
            const product = document.getElementById('productSelect').value;
            const material = document.getElementById('materialSelect').value;
            const mold = document.getElementById('moldSelect').value;
            document.getElementById('viewParamsBtn').disabled = !(product && material && mold);
        }

            // 反馈相关
        function submitFeedback(feedbackData) {
            // --- Airtable 配置 ---
            // 🚨 请务必将下方引号内的文字替换为你申请到的那个 pat... 开头的字符串
            const AIRTABLE_TOKEN = 'patmwwKTnjhzz3P4X.a2cba8ef2be95efe4019ae2c435573cb7ab2615a29f18d364aacb831504c0303'; 
            const BASE_ID = 'app4BOISlcFuPZFdd';
            const TABLE_ID = 'tbl240rBBEgoaB2nm';

            feedbackCount++;
            updateFeedbackCounter();
            saveFeedbackToLocal(feedbackData);

            // 1. 原有的微信推送
            pushToWeChat(feedbackData);

            // 2. 原有的邮件发送逻辑
            if (CONFIG.EMAILJS_PUBLIC_KEY && CONFIG.EMAILJS_PUBLIC_KEY !== '请填写您的EmailJS Public Key') {
                sendEmailViaEmailJS(feedbackData);
            } else {
                console.warn('EmailJS Public Key 未配置，邮件未发送');
            }

            // 3. 新增：自动保存到 Airtable
            const airtableUrl = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`;
            const payload = {
                records: [{
                    fields: {
                        "machineId": feedbackData.machineId || "",
                        "user_name": feedbackData.user_name || "",
                        "content": feedbackData.content || "",
                        "time": new Date().toISOString()
                    }
                }]
            };

            fetch(airtableUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(res => { 
                if(res.ok) {
                    console.log('✅ Airtable 保存成功');
                } else {
                    console.error('❌ Airtable 保存失败，请检查 Token 权限或列名');
                }
            })
            .catch(err => console.error('Airtable 网络错误:', err));

            // 4. 弹出成功提示
            Swal.fire({
                title: t('feedback_success') || '提交成功',
                text: t('feedback_success_text') || '您的反馈已同步至系统',
                icon: 'success',
                confirmButtonText: t('ok') || '确定'
            });
        }

        function pushToWeChat(data) {
            if (!CONFIG.serverChanKey) return;
            const title = `${data.urgent ? '🚨紧急' : '📝'}注塑反馈：${data.machineId}`;
            const desp = `**反馈人**: ${data.user_name}\n**类型**: ${data.type}\n**内容**: ${data.content}\n\n[点击查看看板](${data.page_url})`;
            const url = `https://sctapi.ftqq.com/${CONFIG.serverChanKey}.send?title=${encodeURIComponent(title)}&desp=${encodeURIComponent(desp)}`;
            fetch(url).catch(err => console.error('推送失败:', err));
        }

        function sendEmailViaEmailJS(data) {
            const templateParams = {
                machine_id: data.machineId,
                product: data.product,
                material: data.material,
                mold: data.mold,
                user_name: data.user_name,
                user_dept: data.user_dept,
                type: data.type,
                content: data.content,
                urgent: data.urgent,
                time: new Date(data.timestamp).toLocaleString('zh-CN'),
                page_url: data.page_url,
            };
            emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, templateParams)
                .then(response => console.log('邮件发送成功', response))
                .catch(error => {
                    console.error('邮件发送失败', error);
                    Swal.fire({ title: t('email_failed') || '邮件发送失败', text: t('email_failed_text') || '但微信推送可能成功', icon: 'warning' });
                });
        }

        function saveFeedbackToLocal(feedbackData) {
            try {
                let feedbacks = JSON.parse(localStorage.getItem('injection_feedbacks') || '[]');
                feedbacks.push({ ...feedbackData, id: 'FB' + Date.now(), status: '待处理' });
                localStorage.setItem('injection_feedbacks', JSON.stringify(feedbacks));
            } catch (e) {}
        }

        function loadFeedbackCount() {
            try {
                const feedbacks = JSON.parse(localStorage.getItem('injection_feedbacks') || '[]');
                feedbackCount = feedbacks.length;
                updateFeedbackCounter();
            } catch (e) {}
        }

        function logout() {
            localStorage.removeItem('injection_user');
            currentUser = null;
            updateUserStatus();
            refreshWatermark();
            showLogin(true);
        }

        // 暴露全局函数
        window.showLogin = showLogin;
        window.logout = logout;
    </script>
</body>
</html>
